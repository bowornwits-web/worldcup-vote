<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a472a">
  <title>⚽ World Cup Vote 2026</title>

  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green-dark:   #1a472a;
      --green-mid:    #2d6a4f;
      --green-light:  #52b788;
      --gold:         #ffd700;
      --gold-dark:    #b8860b;
      --white:        #ffffff;
      --card-bg:      rgba(255,255,255,0.09);
      --card-border:  rgba(255,255,255,0.15);
      --radius:       16px;
    }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(160deg, #0d2b16 0%, #1a472a 50%, #1e5631 100%);
      min-height: 100vh;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sticky Top ── */
    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 20;
    }

    /* ── Header ── */
    .header {
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 16px 13px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .header-sub {
      font-size: 14px;
      opacity: 0.6;
      margin-top: 3px;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      color: rgba(255,255,255,0.50);
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── User Card ── */
    .user-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      margin: 14px 14px 0;
      padding: 14px 16px;
      border-radius: var(--radius);
    }
    .user-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--green-light);
      flex-shrink: 0;
    }
    .user-name  { font-size: 18px; font-weight: 700; }
    .user-hint  { font-size: 14px; opacity: 0.6; margin-top: 2px; }

    /* ── Section Label Row ── */
    .section-label-row {
      display: flex;
      align-items: center;
      padding: 16px 16px 8px;
    }
    .section-label {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      opacity: 0.5;
    }
    .reload-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      color: rgba(255,255,255,0.6);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      padding: 5px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .reload-btn:active { opacity: 0.6; }

    /* ── Match Card (Vote Tab) ── */
    .match-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      margin: 8px 14px;
      padding: 16px 14px 14px;
      transition: border-color 0.2s;
    }
    .match-card.has-vote { border-color: rgba(255,215,0,0.35); }

    .match-meta {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.8px;
      opacity: 0.55;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    /* ── Team Buttons ── */
    .teams-row { display: flex; align-items: stretch; gap: 8px; }

    .team-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px 8px;
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: var(--white);
      font-family: inherit;
      cursor: pointer;
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .team-btn:active:not(:disabled) { transform: scale(0.96); }
    .team-btn:disabled { cursor: not-allowed; }
    .team-btn.voted {
      background: linear-gradient(135deg, #c8a600, #ffd700);
      border-color: var(--gold);
      color: #1a2a00;
    }
    .team-btn.voted .team-name { font-weight: 800; }
    .team-btn.other-voted { opacity: 0.5; }

    .team-flag { font-size: 40px; line-height: 1; }
    .team-name { font-size: 16px; font-weight: 600; }

    .voted-badge {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 16px;
    }

    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .vote-hint {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.55;
      min-height: 18px;
    }
    .vote-hint.voted-state {
      color: var(--gold);
      opacity: 1;
      font-weight: 600;
    }

    /* ── Result Card (Results Tab) ── */
    .result-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      margin: 8px 14px;
      padding: 16px 14px 14px;
    }
    .result-card.has-winner { border-color: rgba(255,215,0,0.35); }

    .result-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 4px;
    }
    .result-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 80px;
    }
    .result-side .team-flag { font-size: 38px; line-height: 1; }
    .result-side .team-name { font-size: 14px; font-weight: 600; text-align: center; }
    .result-side .vote-count {
      font-size: 32px;
      font-weight: 800;
      color: rgba(255,255,255,0.65);
      line-height: 1;
      margin-top: 2px;
    }
    .result-side.is-winner .vote-count {
      color: var(--gold);
      text-shadow: 0 0 16px rgba(255,215,0,0.4);
    }
    .result-side.is-winner .team-name { color: var(--gold); }

    .bar-col { flex: 1; }
    .bar-track {
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      display: flex;
    }
    .bar-a { background: var(--green-light); height: 100%; transition: width 0.6s ease; }
    .bar-b { background: #e85d5d;            height: 100%; transition: width 0.6s ease; }
    .bar-pct { text-align: center; font-size: 13px; opacity: 0.45; margin-top: 5px; }

    /* ── Winner Badge ── */
    .winner-badge {
      text-align: center;
      background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
      margin-top: 12px;
    }

    /* ── Voter Toggle ── */
    .voter-toggle {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .voter-toggle:active { background: rgba(255,255,255,0.1); }

    /* ── Voter List ── */
    .voter-list {
      margin-top: 6px;
      background: rgba(0,0,0,0.18);
      border-radius: 8px;
      overflow: hidden;
    }
    .voter-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .voter-item:last-child { border-bottom: none; }
    .voter-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.1);
    }
    .voter-name { flex: 1; font-size: 15px; }
    .voter-badge {
      font-size: 14px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-a { background: rgba(82,183,136,0.2); color: #52b788; }
    .badge-b { background: rgba(232,93,93,0.2);  color: #e85d5d; }

    /* ── Loading ── */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 50vh;
      gap: 18px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    .loading-text { font-size: 17px; opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error / Empty ── */
    .error-box {
      background: rgba(220,50,50,0.18);
      border: 1px solid rgba(220,50,50,0.4);
      border-radius: var(--radius);
      margin: 20px 14px;
      padding: 22px;
      text-align: center;
    }
    .error-box h3 { font-size: 18px; margin-bottom: 8px; }
    .error-box p  { font-size: 15px; opacity: 0.7; }

    .empty-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      margin: 20px 14px;
      padding: 28px 20px;
      text-align: center;
    }
    .empty-box h3 { font-size: 18px; margin-bottom: 8px; }
    .empty-box p  { font-size: 15px; opacity: 0.6; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #27ae60;
      color: white;
      padding: 13px 26px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      z-index: 999;
      opacity: 0;
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), opacity 0.28s;
      pointer-events: none;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: #e74c3c; }

    /* ── Bottom Spacer ── */
    .spacer { height: 36px; }
  </style>
</head>
<body>

<!-- Sticky Header + Tab Bar -->
<div class="sticky-top">
  <div class="header">
    <div class="header-title">⚽ World Cup Vote 2026</div>
    <div class="header-sub">Pick your team · Edit anytime</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-vote"    onclick="switchTab('vote')">🗳️ Vote</button>
    <button class="tab-btn"        id="tab-results" onclick="switchTab('results')">📊 Results</button>
  </div>
</div>

<!-- App Mount Point -->
<div id="app">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const LIFF_ID = '2010574735-9uV6sjKF';
const API_URL = 'https://script.google.com/macros/s/AKfycbwQlJkGT2P1MjpFLZrSTPCNV9iaONZoPu9ta1NuKa3VSLfoAcZ9GGOj0JzSkguyOJ-X/exec';
// ============================================================

let profile        = null;
let matches        = [];
let votes          = {};
let currentTab     = 'vote';
let results        = [];
let resultsLoading = false;
let resultsError   = '';

// ── Init ────────────────────────────────────────────────────

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    profile = await liff.getProfile();
    await loadData();
    render();
  } catch (err) {
    showError('Failed to load app', err.message);
  }
}

// ── Data ────────────────────────────────────────────────────

async function loadData() {
  const url  = `${API_URL}?action=getAll&userId=${encodeURIComponent(profile.userId)}`;
  const res  = await fetch(url);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  matches = data.matches || [];
  votes   = data.votes   || {};
}

async function loadResults() {
  resultsLoading = true;
  resultsError   = '';
  render();
  try {
    const res  = await fetch(`${API_URL}?action=getResults`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    results = data.results || [];
  } catch (err) {
    resultsError = err.message;
  }
  resultsLoading = false;
}

// ── Tab Switching ────────────────────────────────────────────

async function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'results') {
    await loadResults();
  }
  render();
}

async function reloadResults() {
  await loadResults();
  render();
}

// ── Vote Action ─────────────────────────────────────────────

async function vote(matchId, team) {
  const card    = document.getElementById('card-' + matchId);
  const buttons = card.querySelectorAll('.team-btn');
  buttons.forEach(b => b.disabled = true);

  try {
    const params = new URLSearchParams({
      action:      'submitVote',
      userId:      profile.userId,
      lineName:    profile.displayName,
      linePicture: profile.pictureUrl || '',
      matchId,
      team
    });

    const res  = await fetch(`${API_URL}?${params}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Failed to save');

    votes[matchId] = team;
    updateCard(matchId);
    showToast(data.action === 'updated' ? '🔄 Vote updated!' : '🎉 Voted!');

  } catch (err) {
    buttons.forEach(b => b.disabled = false);
    showToast('❌ ' + err.message, true);
  }
}

// ── Render ──────────────────────────────────────────────────

function render() {
  const app = document.getElementById('app');

  if (!profile) {
    app.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading...</div></div>';
    return;
  }

  let html = `
    <div class="user-card">
      <img class="user-avatar"
           src="${escAttr(profile.pictureUrl || 'https://via.placeholder.com/52')}"
           onerror="this.src='https://via.placeholder.com/52'">
      <div>
        <div class="user-name">${escHtml(profile.displayName)}</div>
        <div class="user-hint">${currentTab === 'vote' ? 'Tap to vote · Tap again to change' : "Everyone's votes"}</div>
      </div>
    </div>`;

  html += currentTab === 'vote' ? renderVoteTab() : renderResultsTab();
  html += '<div class="spacer"></div>';
  app.innerHTML = html;
}

// ── Vote Tab — active matches only ──────────────────────────

function renderVoteTab() {
  const active = matches.filter(m => m.isActive);

  if (active.length === 0) {
    return `<div class="empty-box">
      <h3>🔒 No matches open for voting</h3>
      <p>Check the Results tab for previous matches</p>
    </div>`;
  }

  let html = `<div class="section-label-row"><span class="section-label">Matches</span></div>`;
  for (const m of active) html += renderMatchCard(m);
  return html;
}

function renderMatchCard(m) {
  const voted   = votes[m.matchId];
  const hasVote = !!voted;
  const votedA  = voted === m.teamA;
  const votedB  = voted === m.teamB;

  const btnA = `
    <button class="team-btn ${votedA ? 'voted' : (hasVote ? 'other-voted' : '')}"
            onclick="vote('${escAttr(m.matchId)}','${escAttr(m.teamA)}')">
      ${votedA ? '<span class="voted-badge">✅</span>' : ''}
      <span class="team-flag">${m.teamAFlag}</span>
      <span class="team-name">${escHtml(m.teamA)}</span>
    </button>`;

  const btnB = `
    <button class="team-btn ${votedB ? 'voted' : (hasVote ? 'other-voted' : '')}"
            onclick="vote('${escAttr(m.matchId)}','${escAttr(m.teamB)}')">
      ${votedB ? '<span class="voted-badge">✅</span>' : ''}
      <span class="team-flag">${m.teamBFlag}</span>
      <span class="team-name">${escHtml(m.teamB)}</span>
    </button>`;

  const hint = hasVote
    ? `<div class="vote-hint voted-state">✅ You voted: ${escHtml(voted)} (tap other team to change)</div>`
    : `<div class="vote-hint">👆 Tap a team to vote</div>`;

  return `
    <div class="match-card ${hasVote ? 'has-vote' : ''}" id="card-${m.matchId}">
      <div class="match-meta">${escHtml(m.label)} · ${escHtml(m.group)}</div>
      <div class="teams-row">${btnA}<div class="vs-divider">VS</div>${btnB}</div>
      ${hint}
    </div>`;
}

function updateCard(matchId) {
  const match = matches.find(m => m.matchId === matchId);
  if (!match) return;
  const card = document.getElementById('card-' + matchId);
  if (!card) return;
  card.outerHTML = renderMatchCard(match);
}

// ── Results Tab ──────────────────────────────────────────────

function renderResultsTab() {
  if (resultsLoading) {
    return `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading results...</div></div>`;
  }
  if (resultsError) {
    return `<div class="error-box"><h3>⚠️ Failed to load results</h3><p>${escHtml(resultsError)}</p></div>`;
  }
  if (results.length === 0) {
    return `<div class="empty-box"><h3>No data yet</h3><p>No votes have been cast</p></div>`;
  }

  let html = `
    <div class="section-label-row">
      <span class="section-label">Vote Summary</span>
      <button class="reload-btn" onclick="reloadResults()">🔄 Refresh</button>
    </div>`;

  for (const r of results) html += renderResultCard(r);
  return html;
}

function renderResultCard(r) {
  const total     = r.teamACount + r.teamBCount;
  const pctA      = total ? Math.round(r.teamACount / total * 100) : 50;
  const pctB      = 100 - pctA;
  const hasWinner = !!r.winner;
  const winnerA   = r.winner === r.teamA;
  const winnerB   = r.winner === r.teamB;

  const winnerBadge = hasWinner ? `
    <div class="winner-badge">
      🏆 Result: ${winnerA ? r.teamAFlag : winnerB ? r.teamBFlag : ''} ${escHtml(r.winner)}
    </div>` : '';

  const voterRows = r.voters.map(v => {
    const isA = v.team === r.teamA;
    return `
      <div class="voter-item">
        <img class="voter-avatar"
             src="${escAttr(v.linePicture || '')}"
             onerror="this.src='https://via.placeholder.com/36'">
        <span class="voter-name">${escHtml(v.lineName)}</span>
        <span class="voter-badge ${isA ? 'badge-a' : 'badge-b'}">${isA ? r.teamAFlag : r.teamBFlag} ${escHtml(v.team)}</span>
      </div>`;
  }).join('');

  const voterSection = total > 0 ? `
    <button class="voter-toggle" onclick="toggleVoters('${escAttr(r.matchId)}')">
      <span id="chevron-${escAttr(r.matchId)}">▼</span>
      Show voters (${total})
    </button>
    <div class="voter-list" id="voters-${escAttr(r.matchId)}" style="display:none">
      ${voterRows}
    </div>`
  : `<div class="bar-pct" style="margin-top:12px;font-size:14px;opacity:0.5">No votes yet</div>`;

  return `
    <div class="result-card ${hasWinner ? 'has-winner' : ''}">
      <div class="match-meta">
        ${escHtml(r.label)} · ${escHtml(r.group)}${!r.isActive ? ' · 🔒 Closed' : ''}
      </div>

      <div class="result-row">
        <div class="result-side ${winnerA ? 'is-winner' : ''}">
          <span class="team-flag">${r.teamAFlag}</span>
          <span class="team-name">${escHtml(r.teamA)}</span>
          <span class="vote-count">${r.teamACount}</span>
        </div>

        <div class="bar-col">
          <div class="bar-track">
            <div class="bar-a" style="width:${pctA}%"></div>
            <div class="bar-b" style="width:${pctB}%"></div>
          </div>
          <div class="bar-pct">${pctA}% · ${pctB}%</div>
        </div>

        <div class="result-side ${winnerB ? 'is-winner' : ''}">
          <span class="team-flag">${r.teamBFlag}</span>
          <span class="team-name">${escHtml(r.teamB)}</span>
          <span class="vote-count">${r.teamBCount}</span>
        </div>
      </div>

      ${winnerBadge}
      ${voterSection}
    </div>`;
}

function toggleVoters(matchId) {
  const el   = document.getElementById('voters-' + matchId);
  const icon = document.getElementById('chevron-' + matchId);
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  icon.textContent  = open ? '▼' : '▲';
}

// ── Utilities ────────────────────────────────────────────────

function showError(title, detail) {
  document.getElementById('app').innerHTML = `
    <div class="error-box">
      <h3>⚠️ ${escHtml(title)}</h3>
      <p>${escHtml(detail || '')}</p>
    </div>`;
}

let toastTimer = null;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast' + (isError ? ' error' : '');
  void el.offsetWidth;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,"\\'");
}

// ── Start ────────────────────────────────────────────────────
init();
</script>
</body>
</html>
